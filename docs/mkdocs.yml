site_name: CyberScanner Docs
site_description: Documentation for CyberScanner — a professional-grade cybersecurity scanner
site_author: CyberScanner

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

nav:
  - Home: PROJECT_PLAN.md
  - Workflow: workflow/WORKFLOW.md
