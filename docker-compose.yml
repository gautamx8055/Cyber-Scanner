services:
  db:
    image: postgres:16
    container_name: cyberscanner_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: cyberscanner_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # `db` is the service name on the default compose network — Docker's
      # built-in DNS resolves it to the postgres container's IP. Hard-coding
      # 5432 is fine: that's the in-network port, separate from the host
      # mapping above.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    # `urllib` ships with python:3.12-slim, so no extra apt package needed.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: cyberscanner_frontend
    restart: unless-stopped
    environment:
      # The browser (not the container) calls the backend, so this URL is
      # reachable from the host — the published 8000 port. Inside the network
      # you'd use http://backend:8000, but that name doesn't resolve in the
      # user's browser.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      # Anonymous volume keeps the container's pre-installed node_modules from
      # being shadowed by the host bind-mount (host has no node_modules in
      # CI/clean checkouts).
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  default:
    name: cyberscanner_net

volumes:
  postgres_data:
